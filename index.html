<!--
index.html
============================================================
这是 App 的主页面。

新版结构：
对象 × 场景 × 礼貌度 × 长度

这个页面帮助用户整理可以复制到 ChatGPT 的提示词。
============================================================
-->

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>职场日语表达助手</title>

  <link rel="manifest" href="manifest.webmanifest" />

  <meta name="apple-mobile-web-app-title" content="职场日语" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="theme-color" content="#0f2a4a" />

  <link rel="icon" href="icon.png" type="image/png" />
  <link rel="apple-touch-icon" href="icon.png" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="app-shell">

    <header class="app-header">
      <div class="logo-circle">
        <img src="icon.png" alt="App logo" />
      </div>

      <div class="header-text">
        <p class="eyebrow">职场日语表达助手</p>
        <h1>职场日语表达助手</h1>
        <p class="subtitle">把中文想法整理成自然的日本职场日语</p>
      </div>
    </header>

    <section class="notice-card">
      <div class="notice-title">先写中文，再复制到 ChatGPT</div>
      <p>
        根据对象、使用场景、礼貌度和长度，帮你生成一段可以复制到 ChatGPT 的提示词。
        请不要输入客户名、项目名、公司机密等敏感信息。
      </p>
    </section>

    <main class="main-card">

      <div class="section-title-row">
        <span class="step-badge">1</span>
        <h2>输入你想表达的中文</h2>
      </div>

      <textarea
        id="chineseInput"
        class="text-input"
        placeholder="例如：任务进度有点延迟，但我已经确认了原因，今天下午会继续处理。"
      ></textarea>

      <div class="quick-row" aria-label="常用组合">
        <button type="button" class="quick-button" data-preset="delay">进度延期</button>
        <button type="button" class="quick-button" data-preset="ask">请同事帮忙</button>
        <button type="button" class="quick-button" data-preset="sick">请假/迟到</button>
      </div>

      <div class="section-title-row">
        <span class="step-badge">2</span>
        <h2>选择沟通条件</h2>
      </div>

      <label class="field-label" for="audienceSelect">
        对象：说给谁
      </label>
      <select id="audienceSelect" class="select-input">
        <option>上司</option>
        <option>同事</option>
        <option>团队全体</option>
        <option>客户 / 公司外部</option>
        <option>自己备忘</option>
      </select>

      <label class="field-label" for="channelSelect">
        场景：在哪里使用
      </label>
      <select id="channelSelect" class="select-input">
        <option>Slack / Teams</option>
        <option>邮件</option>
        <option>口头报告 / 朝会发言</option>
        <option>朝会模板填写</option>
        <option>文档 / 会议记录</option>
      </select>

      <div class="section-title-row compact">
        <span class="step-badge">3</span>
        <h2>调整表达风格</h2>
      </div>

      <div class="two-column-grid">
        <div>
          <label class="field-label" for="politenessSelect">
            礼貌度：表达要多正式
          </label>
          <select id="politenessSelect" class="select-input">
            <option>稍微轻松</option>
            <option>普通礼貌</option>
            <option>更正式</option>
          </select>
        </div>

        <div>
          <label class="field-label" for="lengthSelect">
            长度 / 形式：输出要多长
          </label>
          <select id="lengthSelect" class="select-input">
            <option>短句 / 条目</option>
            <option>一句话</option>
            <option>简短：1-2句</option>
            <option>标准：2-3句</option>
            <option>稍详细：4-5句</option>
          </select>
        </div>
      </div>

      <button id="generateButton" class="primary-button">
        生成提示词
      </button>

      <p id="statusMessage" class="status-message"></p>
    </main>

    <section id="resultSection" class="result-card hidden">
      <div class="result-header">
        <div>
          <p class="eyebrow small">复制到 ChatGPT 使用</p>
          <h2>已为你整理好提示词</h2>
        </div>
        <button id="copyButton" class="copy-button">
          复制提示词
        </button>
      </div>

      <textarea id="promptOutput" class="prompt-output" readonly></textarea>

      <p class="hint-text">
        复制后请切换到 ChatGPT App 或网页版，把提示词粘贴进去发送即可。
      </p>
    </section>

    <section class="history-card">
      <div class="history-header">
        <div>
          <p class="eyebrow small">最近使用</p>
          <h2>最近记录</h2>
        </div>
        <button id="clearHistoryButton" class="secondary-button">
          清空
        </button>
      </div>

      <div id="historyList" class="history-list">
        <p class="empty-history">还没有历史记录。</p>
      </div>
    </section>

  </div>

  <script src="app.js"></script>
</body>
</html>
